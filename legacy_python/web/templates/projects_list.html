{% extends "base.html" %}
{% block title %}Projects{% endblock %}
{% block content %}
<h1 class="mb-4">Projects</h1>
<table class="table table-striped">
  <thead><tr><th>ID</th><th>Name</th><th>Owner</th><th>Clips</th></tr></thead>
  <tbody>
    {% for p in projects %}
    <tr>
      <td><a href="/projects/{{ p.projectID }}">{{ p.projectID }}</a></td>
      <td>{{ p.name }}</td>
      <td>{{ p.owner }}</td>
      <td>{{ p.clip_count }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
